name: Deploy Showcases to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Loved One Showcase
        run: |
          cd showcase-loved-one
          npm ci
          npm run build

      - name: Build Best Friends Showcase
        run: |
          cd showcase-best-friends
          npm ci
          npm run build

      - name: Build Portfolio Showcase
        run: |
          cd showcase-portfolio
          npm ci
          npm run build

      - name: Prepare GitHub Pages Static Directory
        run: |
          mkdir -p dist/showcase-loved-one
          mkdir -p dist/showcase-best-friends
          mkdir -p dist/showcase-portfolio
          cp -r showcase-loved-one/out/* dist/showcase-loved-one/
          cp -r showcase-best-friends/out/* dist/showcase-best-friends/
          cp -r showcase-portfolio/out/* dist/showcase-portfolio/
          touch dist/.nojekyll
          cat << 'EOF' > dist/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>Memory Pixel Showcases | GitHub Pages</title>
            <style>
              body { font-family: system-ui, -apple-system, sans-serif; background: #090b12; color: #fff; text-align: center; padding: 60px 20px; }
              h1 { color: #f2c94c; font-size: 2.5rem; margin-bottom: 10px; }
              p { color: #a0a6b8; max-width: 600px; margin: 0 auto 40px; line-height: 1.6; }
              .grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; max-width: 900px; margin: 0 auto; }
              .card { background: #131722; border: 1px solid rgba(255,255,255,0.12); padding: 30px; border-radius: 16px; width: 260px; text-decoration: none; color: white; transition: transform 0.2s, border-color 0.2s; }
              .card:hover { transform: translateY(-5px); border-color: #f2c94c; }
              .card h3 { font-size: 1.4rem; margin: 0 0 10px; color: #f2c94c; }
              .card p { font-size: 0.9rem; margin: 0; color: #a0a6b8; }
            </style>
          </head>
          <body>
            <h1>Memory Pixel Showcases</h1>
            <p>Select any of our interactive showcase templates below, built with Next.js and hosted natively on GitHub Pages.</p>
            <div class="grid">
              <a class="card" href="./showcase-loved-one/">
                <h3>Loved One</h3>
                <p>Birthdays, anniversaries, proposals and romantic surprises.</p>
              </a>
              <a class="card" href="./showcase-best-friends/">
                <h3>Best Friends</h3>
                <p>Bestie birthdays, college farewells and friendship memories.</p>
              </a>
              <a class="card" href="./showcase-portfolio/">
                <h3>Portfolio</h3>
                <p>Modern 3-page professional showcase for students & creators.</p>
              </a>
            </div>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
